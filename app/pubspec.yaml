name: minoan_ai_platform
description: IntegraMind AI × Minoan Lines — AI-Powered Operations Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.9

  # Navigation
  go_router: ^14.2.7

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP / networking
  dio: ^5.7.0
  http: ^1.2.2

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Charts
  fl_chart: ^0.69.0

  # UI utilities
  intl: ^0.19.0
  timeago: ^3.7.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  gap: ^3.0.1

  # Icons
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.0.8

  # Utils
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  shared_preferences: ^2.3.2
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700