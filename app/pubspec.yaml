name: minoan_ai_platform
description: IntegraMind AI × Minoan Lines — AI-Powered Operations Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.9

  # Navigation
  go_router: ^14.2.7

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP / networking
  dio: ^5.7.0

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Charts
  fl_chart: ^0.69.0

  # UI utilities
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true