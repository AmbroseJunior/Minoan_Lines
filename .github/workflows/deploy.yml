name: Deploy

on:
  push:
    branches: [master]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Flutter Web → Vercel
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git \
            --branch stable --single-branch --depth 1 "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Configure Flutter
        run: |
          flutter config --no-analytics --enable-web
          flutter --version

      - name: pub get
        run: flutter pub get
        working-directory: app

      - name: Build web
        working-directory: app
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          RAW="$(echo "${API_BASE_URL}" | tr -d '[:space:]' | sed 's|/*$||')"
          API_URL="${RAW:-https://minoanlines-production.up.railway.app}"
          echo ">>> API_URL baked in: ${API_URL}"
          flutter build web --release \
            "--dart-define=SUPABASE_URL=${SUPABASE_URL}" \
            "--dart-define=SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}" \
            "--dart-define=API_BASE_URL=${API_URL}"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          mkdir -p .vercel/output/static
          cp -r app/build/web/. .vercel/output/static/

          # Cache headers: no-cache service worker so browsers always pick up new builds
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              {
                "src": "/flutter_service_worker.js",
                "headers": { "Cache-Control": "no-cache, no-store, must-revalidate" },
                "continue": true
              },
              {
                "src": "/assets/(.*)",
                "headers": { "Cache-Control": "public, max-age=31536000, immutable" },
                "continue": true
              },
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" \
            > .vercel/project.json
          vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"

  deploy-backend:
    name: FastAPI → Railway
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Railway
        run: npm install -g @railway/cli@latest && railway up --service Minoan_Lines --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}