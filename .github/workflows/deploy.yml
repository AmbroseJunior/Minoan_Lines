name: Deploy

on:
  push:
    branches: [master]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Flutter Web → Vercel ────────────────────────────────────────────────────
  deploy-frontend:
    name: Flutter Web → Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter 3.24.5
        run: |
          curl -fsSL \
            "https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.24.5-stable.tar.xz" \
            -o /tmp/flutter.tar.xz
          tar xf /tmp/flutter.tar.xz -C "$HOME"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Configure Flutter for web
        run: |
          flutter config --no-analytics --enable-web
          flutter --version

      - name: Install pub dependencies
        run: flutter pub get
        working-directory: app

      - name: Build Flutter web
        working-directory: app
        run: |
          flutter build web \
            --release \
            --web-renderer html \
            "--dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
            "--dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" \
            "--dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          mkdir -p .vercel/output/static
          cp -r app/build/web/. .vercel/output/static/
          printf '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}' \
            > .vercel/output/config.json
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" \
            > .vercel/project.json
          vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"

  # ── FastAPI → Railway (non-blocking) ────────────────────────────────────────
  deploy-backend:
    name: FastAPI → Railway
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        run: |
          npm install -g @railway/cli@latest
          railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}