name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Trigger Vercel deployment (Vercel builds Flutter via scripts/vercel-build.sh)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-flutter-web:
    name: Flutter Web → Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Vercel production deployment
        run: |
          curl -fsSL -X POST \
            "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "minoan-lines",
              "gitSource": {
                "type": "github",
                "repoId": "${{ github.event.repository.id }}",
                "ref": "${{ github.ref_name }}"
              },
              "target": "production"
            }'

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Deploy FastAPI backend to Railway
  # ──────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: FastAPI → Railway
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service minoan-api --detach
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}