name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy-frontend:
    name: Flutter Web → Vercel
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git \
            --branch stable --single-branch --depth 1 "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Configure Flutter
        run: |
          flutter config --no-analytics --enable-web
          flutter --version

      - name: pub get
        run: flutter pub get
        working-directory: app

      - name: Build web
        working-directory: app
        run: |
          flutter build web --release \
            "--dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
            "--dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" \
            "--dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          mkdir -p .vercel/output/static
          cp -r app/build/web/. .vercel/output/static/
          printf '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}' \
            > .vercel/output/config.json
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" \
            > .vercel/project.json
          vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"

  deploy-backend:
    name: FastAPI → Railway
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Railway
        run: npm install -g @railway/cli@latest && railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}